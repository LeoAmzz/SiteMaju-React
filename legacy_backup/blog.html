<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJU Journal | Blog - MAJU Assessoria & Consultoria</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header from Components -->
    <maju-header></maju-header>

    <main>
        <!-- Blog Hero Section -->
        <section class="blog-hero">
            <div class="container">
                <span class="eyebrow">Insights & Notícias</span>
                <h1>MAJU Journal</h1>
                <p>Fique por dentro das principais novidades institucionais, eventos exclusivos e atualizações oficiais sobre a trajetória da MAJU.</p>
            </div>
        </section>

        <!-- Blog Content -->
        <section class="section-padding blog-content">
            <div class="container">
                <!-- Filters -->
                <div class="blog-filters">
                    <button class="filter-btn active" data-category="all">Todos</button>
                    <button class="filter-btn" data-category="Tendências">Tendências</button>
                    <button class="filter-btn" data-category="Dicas">Dicas</button>
                    <button class="filter-btn" data-category="Lifestyle">Lifestyle</button>
                    <button class="filter-btn" data-category="Jurídico">Jurídico</button>
                </div>

                <!-- Grid -->
                <div class="blog-grid" id="blog-grid">
                    <!-- Posts will be loaded here via JS -->
                </div>

                <!-- Load More -->
                <div class="load-more-container">
                    <button id="load-more-btn" class="btn btn-outline">Carregar Mais</button>
                </div>
            </div>
        </section>

        <!-- CTA Section (Consistent with other pages) -->
        <section class="cta" style="background-image: url('Imagens/Default_bookshelf_with_books_in_a_highly_realistic_law_office_3.png');">
            <div class="container cta-content">
                <h2>Mantenha-se informado</h2>
                <p style="color: white; margin-bottom: 20px;">Como podemos te ajudar?</p>
                <a href="contato.html" class="btn btn-white">Fale conosco</a>
            </div>
        </section>

    </main>

    <!-- Footer from Components -->
    <maju-footer></maju-footer>

    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
